<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUT Generator — Tax ID Generator</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

  <header class="site-header">
    <a href="../index.html">Tax ID Generator</a>
    <span class="breadcrumb">/ RUT — Chile</span>
  </header>

  <main class="page-generator">
    <div class="card">
      <h2><span class="fi fi-cl h2-flag"></span> RUT number for CLP deposits</h2>

      <label for="rutNumber">RUT Number:</label>
      <input type="text" id="rutNumber" placeholder="e.g. 12.345.678-5" readonly>

      <div class="btn-row">
        <button type="button" onclick="generateRandomRUT()">Generate</button>
        <button type="button" id="rutCopyBtn" onclick="copyRUT()">Copy</button>
      </div>
    </div>
  </main>

  <script src="../js/rut.js"></script>
</body>
</html>
