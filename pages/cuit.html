<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CUIT & CBU/CVU Generator — Tax ID Generator</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

  <header class="site-header">
    <a href="../index.html">Tax ID Generator</a>
    <span class="breadcrumb">/ CUIT & CBU/CVU — Argentina</span>
  </header>

  <main class="page-generator">
    <div class="card">
      <h2><span class="fi fi-ar h2-flag"></span> CUIT & CBU/CVU for ARS deposits</h2>

      <label for="cuitNumber">CUIT Number:</label>
      <input type="text" id="cuitNumber" placeholder="e.g. 20-12345678-9" readonly>

      <div class="btn-row">
        <button type="button" onclick="generateRandomCUIT()">Generate</button>
        <button type="button" id="cuitCopyBtn" onclick="copyCUIT()">Copy</button>
      </div>

      <label for="cbuNumber" style="margin-top:16px">CBU / CVU Number:</label>
      <input type="text" id="cbuNumber" placeholder="e.g. 2850590940090418135201" readonly>

      <div class="btn-row">
        <button type="button" onclick="generateCBU()">Generate</button>
        <button type="button" id="cbuCopyBtn" onclick="copyCBU()">Copy</button>
      </div>
    </div>
  </main>

  <script src="../js/cuit.js"></script>
</body>
</html>
