<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPF Generator — Tax ID Generator</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
</head>
<body>

  <header class="site-header">
    <a href="../index.html">Tax ID Generator</a>
    <span class="breadcrumb">/ CPF — Brazil</span>
  </header>

  <main class="page-generator">
    <div class="card">
      <h2><span class="fi fi-br h2-flag"></span> CPF number for BRL deposits</h2>

      <label for="cpfNumber">CPF Number:</label>
      <input type="text" id="cpfNumber" readonly>

      <div class="btn-row">
        <button type="button" onclick="generateRandomCPF()">Generate</button>
        <button type="button" id="cpfCopyBtn" onclick="copyCPF()">Copy</button>
      </div>
    </div>
  </main>

  <script src="../js/cpf.js"></script>
</body>
</html>
